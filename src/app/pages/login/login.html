<style>
  @keyframes magicFloat {
    0% { transform: translateY(0px) translateX(0px) scale(0.6); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(-160px) translateX(60px) scale(1.2); opacity: 0; }
  }
  @keyframes pulseMoon {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.06); opacity: 0.6; }
  }

  .spark-1 { animation: magicFloat 4.5s ease-in-out infinite; }
  .spark-2 { animation: magicFloat 6.5s ease-in-out infinite 1.2s; }
  .spark-3 { animation: magicFloat 5.2s ease-in-out infinite 2.4s; }
  .spark-4 { animation: magicFloat 7s ease-in-out infinite 0.6s; }
  .spark-5 { animation: magicFloat 5.8s ease-in-out infinite 3.5s; }
  .spark-6 { animation: magicFloat 6.2s ease-in-out infinite 1.8s; }

  .moon-glow { animation: pulseMoon 6s ease-in-out infinite; }
</style>

<div class="min-h-screen flex items-center justify-center bg-gradient-to-b from-[#090212] via-[#1a0833] to-[#05010a] px-4 py-8 relative overflow-hidden font-mono">
  
  <!-- Luna Gótica / Sangrienta de fondo con brillo pulsante -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[320px] sm:w-[480px] h-[320px] sm:h-[480px] bg-gradient-to-t from-red-900/40 via-purple-900/30 to-transparent rounded-full blur-3xl moon-glow pointer-events-none z-0"></div>

  <!-- Textura de muro de piedra gótico sutil en el fondo -->
  <div class="absolute inset-0 opacity-15 pointer-events-none bg-[radial-gradient(#4a1d77_1px,transparent_1px)] [background-size:24px_24px] z-1"></div>

  <!-- MUCHÍSIMAS PARTÍCULAS / CHISPAS MÁGICAS Y CENIZAS FLOTANDO -->
  <div class="absolute inset-0 pointer-events-none z-15 overflow-hidden">
    <!-- Izquierda -->
    <div class="absolute bottom-10 left-[12%] w-2 h-2 bg-red-400/70 rounded-full blur-[1px] spark-1"></div>
    <div class="absolute bottom-20 left-[20%] w-3 h-3 bg-purple-300/60 rounded-full blur-[2px] spark-3"></div>
    <div class="absolute bottom-6 left-[30%] w-2.5 h-2.5 bg-amber-200/50 rounded-full blur-[1px] spark-2"></div>
    
    <!-- Centro / Alrededor de la tarjeta -->
    <div class="absolute bottom-16 left-[40%] w-3 h-3 bg-red-500/60 rounded-full blur-[2px] spark-5"></div>
    <div class="absolute bottom-8 left-[50%] w-2 h-2 bg-purple-400/70 rounded-full blur-[1px] spark-4"></div>
    <div class="absolute bottom-22 left-[62%] w-3.5 h-3.5 bg-amber-300/50 rounded-full blur-[2px] spark-6"></div>

    <!-- Derecha -->
    <div class="absolute bottom-12 left-[74%] w-2.5 h-2.5 bg-red-400/65 rounded-full blur-[1px] spark-2"></div>
    <div class="absolute bottom-24 left-[84%] w-3 h-3 bg-purple-300/60 rounded-full blur-[2px] spark-1"></div>
    <div class="absolute bottom-14 left-[91%] w-2 h-2 bg-amber-200/60 rounded-full blur-[1px] spark-3"></div>

    <!-- Partículas superiores adicionales -->
    <div class="absolute bottom-44 left-[18%] w-2.5 h-2.5 bg-red-500/50 rounded-full blur-[1px] spark-4"></div>
    <div class="absolute bottom-52 left-[78%] w-3 h-3 bg-purple-400/50 rounded-full blur-[2px] spark-5"></div>
    <div class="absolute bottom-38 left-[48%] w-2 h-2 bg-amber-300/60 rounded-full blur-[1px] spark-6"></div>
  </div>

  <!-- TARJETA PRINCIPAL DE LOGIN (ESTILO CASTLEVANIA / GÓTICO) -->
  <div class="bg-[#12071f]/95 backdrop-blur-md border-4 border-red-900/80 p-8 sm:p-10 rounded-2xl shadow-[0_25px_60px_rgba(0,0,0,0.95)] w-full max-w-md text-center relative z-20">
    
    <!-- Emblema / Murciélago o Cáliz Central -->
    <div class="w-16 h-16 bg-gradient-to-br from-red-950 to-purple-950 border-3 border-red-600/70 rounded-2xl mx-auto flex items-center justify-center shadow-[0_6px_0_#450a0a] mb-5 transform hover:scale-110 transition-transform">
      <span class="text-3xl">🦇</span>
    </div>
    
    <div class="mb-8">
      <h1 class="text-2xl sm:text-3xl font-black text-red-500 tracking-wider uppercase drop-shadow-[0_2px_6px_rgba(239,68,68,0.5)]">
        AnLe <span class="text-purple-300">Préstamos</span>
      </h1>
      <p class="text-purple-300/70 mt-2 text-xs sm:text-sm tracking-widest uppercase font-bold">
        "CASTLE KEEP • DRACULA'S CURSE"
      </p>
    </div>

    <!-- Botón de Google Estilo Gótico Arcade -->
    <button 
      (click)="loginWithGoogle()"
      class="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-red-900 via-purple-900 to-red-950 hover:from-red-800 hover:to-red-900 active:translate-y-1 text-white font-bold py-4 px-4 rounded-xl transition-all duration-100 shadow-[0_6px_0_#450a0a] active:shadow-[0_2px_0_#450a0a] cursor-pointer group border-2 border-red-500/40">
      <div class="bg-white p-1.5 rounded-lg shadow-sm group-hover:scale-105 transition-transform">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo" class="w-5 h-5 flex-shrink-0">
      </div>
      <span class="text-base tracking-wider uppercase">Continuar con Google</span>
    </button>

    <div class="mt-6 text-[11px] text-purple-300/50 tracking-widest uppercase">
      STAGE 4-1 • 1P READY
    </div>

  </div>
</div>
