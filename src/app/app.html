<router-outlet></router-outlet>

@if (toastService.currentToast(); as toast) {
  <div class="fixed bottom-6 right-6 z-[100] transition-all transform duration-500 ease-out">
    <div class="px-6 py-4 rounded-xl border-2 shadow-[0_15px_40px_rgba(0,0,0,0.8)] backdrop-blur-md flex items-center gap-4 text-sm font-bold tracking-wide uppercase"
         [ngClass]="{
           'bg-[#1f0909]/95 border-red-500/60 text-red-100': toast.type === 'error',
           'bg-[#061f12]/95 border-emerald-500/60 text-emerald-100': toast.type === 'success',
           'bg-[#1f1606]/95 border-amber-500/60 text-amber-100': toast.type === 'warning'
         }">
      <span class="text-xl drop-shadow-md">
        @if (toast.type === 'error') { 🩸 }
        @if (toast.type === 'success') { 🦇 }
        @if (toast.type === 'warning') { 📜 }
      </span>
      <span class="mt-0.5">{{ toast.message }}</span>
    </div>
  </div>
}
